apiVersion: v1
kind: PersistentVolume
metadata:
  name: ebs
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 5Gi #should be less than or equal to 5 
  csi:
    driver: ebs.csi.aws.com
    fsType: ext4
    volumeHandle: vol-0da2ceaa2dcf42db1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-claim
spec:
  storageClassName: "" # Empty string must be explicitly set otherwise default StorageClass will be set
  volumeName: ebs # This is the PV name
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi